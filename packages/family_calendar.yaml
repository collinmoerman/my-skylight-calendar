# ==============================================================================
#  FAMILY CALENDAR BACKEND PACKAGE
# ==============================================================================

input_text:
  family_calendar_filter:
    name: Family Filter
    initial: "^$"
  benchapp_calendar_filter:
    name: BenchApp Filter
    initial: "^$"

  calendar_event_title:
    name: Event Title
    icon: mdi:format-title
  calendar_event_description:
    name: Event Description
    icon: mdi:text
  calendar_event_location:
    name: Event Location
    icon: mdi:map-marker

input_select:
  calendar_select:
    name: Select Calendar
    options:
      - Family
      - BenchApp
    icon: mdi:calendar-check

  calendar_view:
    name: Calendar View
    options:
      - Today
      - Tomorrow
      - Week
      - Biweek
      - 4-week
      - Month
    initial: Month

input_datetime:
  calendar_event_start:
    has_date: true
    has_time: true
  calendar_event_end:
    has_date: true
    has_time: true
  calendar_day_event_start:
    has_date: true
    has_time: false
  calendar_day_event_end:
    has_date: true
    has_time: false

input_boolean:
  calendar_all_day_event:
    name: All Day Event
    icon: mdi:calendar-clock

# Dashboard config sensors. Add/remove Family Lists tab cards in
# todo_lists.lists; each item becomes one card and columns controls width.
template:
  - sensor:
      - name: Family Dashboard Header Config
        unique_id: family_dashboard_header_config
        default_entity_id: sensor.family_dashboard_header_config
        state: configured
        variables:
          header_config:
            thermostat:
              entity: climate.home_thermostat
              title: Nest
            weather:
              entity: weather.nws_weather_karb
              forecast_entity: sensor.skylight_weather_next_7_days
              forecast_days: 5
        attributes:
          config: "{{ header_config | to_json }}"

      - name: Family Dashboard Invitees
        unique_id: family_dashboard_invitees
        default_entity_id: sensor.family_dashboard_invitees
        state: "{{ invitees | count }}"
        variables:
          invitees:
            - name: Collin
              email: collin.moerman@gmail.com
              default: true
            - name: Ashley
              email: ashley.moerman@gmail.com
              default: true
        attributes:
          config: "{{ invitees | to_json }}"

      - name: Family Dashboard Todo Lists
        unique_id: family_dashboard_todo_lists
        default_entity_id: sensor.family_dashboard_todo_lists
        state: "{{ todo_lists.lists | count }}"
        variables:
          todo_lists:
            columns: 2
            defaults:
              hide_completed: true
              hide_section_headers: true
              item_tap_action: edit
            lists:
              - title: Meals
                entity: todo.meals
              - title: Meijer
                entity: todo.meijer
        attributes:
          config: "{{ todo_lists | to_json }}"

automation:
  - id: sync_calendar_event_invitees_on_start
    alias: Sync Calendar Event Invitees On Start
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: "00:00:10"
      - action: script.sync_calendar_event_invitees
    mode: single

script:
  family_calendar_visible_filter:
    alias: Toggle Family Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.family_calendar_filter
        data:
          value: "{% if is_state('input_text.family_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  benchapp_calendar_visible_filter:
    alias: Toggle BenchApp Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.benchapp_calendar_filter
        data:
          value: "{% if is_state('input_text.benchapp_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  sync_calendar_event_invitees:
    alias: Sync Calendar Event Invitees
    sequence:
      - variables:
          invitees: "{{ (state_attr('sensor.family_dashboard_invitees', 'config') or '[]') | from_json }}"
          invitee_names: >-
            {% set ns = namespace(names=[]) %}
            {% for invitee in invitees %}
              {% set ns.names = ns.names + [invitee.name] %}
            {% endfor %}
            {{ ns.names | join(',') }}
          default_invitee_names: >-
            {% set ns = namespace(names=[]) %}
            {% for invitee in invitees %}
              {% if invitee.default | default(false) | bool %}
                {% set ns.names = ns.names + [invitee.name] %}
              {% endif %}
            {% endfor %}
            {{ ns.names | join(',') }}
      - action: input_multiselect.set_options
        target:
          entity_id: input_multiselect.calendar_event_invitees
        data:
          options: "{{ invitee_names }}"
      - action: input_multiselect.set_value
        target:
          entity_id: input_multiselect.calendar_event_invitees
        data:
          options: "{{ default_invitee_names }}"

  add_google_calendar_event:
    alias: Process Add Calendar Event
    sequence:
      - variables:
          invitees: "{{ (state_attr('sensor.family_dashboard_invitees', 'config') or '[]') | from_json }}"
          selected_invitees: "{{ state_attr('input_multiselect.calendar_event_invitees', 'selected_options') or [] }}"
          calendar_map:
            Family: calendar.family
            BenchApp: calendar.benchapp_2
          target_calendar: "{{ calendar_map.get(states('input_select.calendar_select'), 'calendar.family') }}"
          selected_invitee_emails: >-
            {% set ns = namespace(emails=[]) %}
            {% for invitee in invitees %}
              {% if invitee.name in selected_invitees %}
                {% set ns.emails = ns.emails + [invitee.email] %}
              {% endif %}
            {% endfor %}
            {{ ns.emails | join(',') }}

      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "on"
            sequence:
              - action: google.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  location: "{{ states('input_text.calendar_event_location') }}"
                  attendees: "{{ selected_invitee_emails }}"
                  start_date: "{{ states('input_datetime.calendar_day_event_start') }}"
                  end_date: "{{ states('input_datetime.calendar_day_event_end') }}"
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "off"
            sequence:
              - action: google.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  location: "{{ states('input_text.calendar_event_location') }}"
                  attendees: "{{ selected_invitee_emails }}"
                  start_date_time: "{{ states('input_datetime.calendar_event_start') }}"
                  end_date_time: "{{ states('input_datetime.calendar_event_end') }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_title
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_description
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_location
        data:
          value: ""
      - action: script.sync_calendar_event_invitees
