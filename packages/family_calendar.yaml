# ==============================================================================
#  FAMILY CALENDAR BACKEND PACKAGE
# ==============================================================================

input_text:
  family_calendar_filter:
    name: Family Filter
    initial: "^$"
  benchapp_calendar_filter:
    name: BenchApp Filter
    initial: "^$"

  calendar_event_title:
    name: Event Title
    icon: mdi:format-title
  calendar_event_description:
    name: Event Description
    icon: mdi:text

input_select:
  skylight_dashboard_panel:
    name: Skylight Dashboard Panel
    options:
      - Calendar
      - Lists
    initial: Calendar
    icon: mdi:view-dashboard

  calendar_select:
    name: Select Calendar
    options:
      - Family
      - BenchApp
    icon: mdi:calendar-check

  calendar_view:
    name: Calendar View
    options:
      - Today
      - Tomorrow
      - Week
      - Biweek
      - Month
    initial: Month

input_datetime:
  calendar_event_start:
    has_date: true
    has_time: true
  calendar_event_end:
    has_date: true
    has_time: true
  calendar_day_event_start:
    has_date: true
    has_time: false
  calendar_day_event_end:
    has_date: true
    has_time: false

input_boolean:
  calendar_all_day_event:
    name: All Day Event
    icon: mdi:calendar-clock

script:
  show_family_calendar_panel:
    alias: Show Family Calendar Panel
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.skylight_dashboard_panel
        data:
          option: Calendar

  show_family_lists_panel:
    alias: Show Family Lists Panel
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.skylight_dashboard_panel
        data:
          option: Lists

  family_calendar_visible_filter:
    alias: Toggle Family Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.family_calendar_filter
        data:
          value: "{% if is_state('input_text.family_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  benchapp_calendar_visible_filter:
    alias: Toggle BenchApp Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.benchapp_calendar_filter
        data:
          value: "{% if is_state('input_text.benchapp_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  add_google_calendar_event:
    alias: Process Add Calendar Event
    sequence:
      - variables:
          calendar_map:
            Family: calendar.family
            BenchApp: calendar.benchapp
          target_calendar: "{{ calendar_map.get(states('input_select.calendar_select'), 'calendar.family') }}"

      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "on"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date: "{{ states('input_datetime.calendar_day_event_start') }}"
                  end_date: "{{ states('input_datetime.calendar_day_event_end') }}"
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "off"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date_time: "{{ states('input_datetime.calendar_event_start') }}"
                  end_date_time: "{{ states('input_datetime.calendar_event_end') }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_title
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_description
        data:
          value: ""
      - action: browser_mod.close_popup
        data: {}
