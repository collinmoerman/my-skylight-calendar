views:
  - title: Family Calendar
    path: family-calendar
    icon: mdi:calendar-month
    type: sections
    max_columns: 4
    theme: Skylight
    background:
      opacity: 62
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image: /local/calbackgrd.png
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Moerman Family Calendar
            heading_style: title
            icon: mdi:calendar-heart
          - type: weather-forecast
            entity: weather.nws_weather_karb
            name: Weather
            show_current: true
            show_forecast: true
            forecast_type: daily

      - type: grid
        column_span: 3
        cards:
          - type: calendar
            title: Family Schedule
            initial_view: listWeek
            entities:
              - calendar.family
              - calendar.collin_moerman_gmail_com
              - calendar.birthdays
              - calendar.benchapp
              - calendar.working_location

      - type: grid
        column_span: 1
        cards:
          - type: todo-list
            title: Meals
            entity: todo.meals
            hide_completed: true
            hide_section_headers: true
            item_tap_action: edit
          - type: markdown
            content: >
              Meal ideas come from the OurGroceries **Meals** list.

              Add or edit items here and they stay synced with `todo.meals`.
