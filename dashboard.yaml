views:
  - type: sections
    max_columns: 10
    title: Calendar
    path: family-calendar
    theme: Skylight
    sections:
      # --- START HEADER SECTION (Date & Weather) ---
      - type: grid
        cards:
          - type: custom:better-moment-card
            parentStyle: |
              line-height:normal;
            moment:
              - parentStyle: |
                  font-size:1em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=cccc}}
              - parentStyle: |
                  font-size:1.5em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=LLLL dd, yyyy}}              
              - parentStyle: |
                  font-size:3.2em;  text-align:center; font-weight:400;
                templateRaw: |
                  {{moment format=HH:mm}} 
            grid_options:
              columns: 14
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
          - type: custom:weather-card
            entity: weather.nws_weather_karb
            current: true
            details: true
            forecast: false
            grid_options:
              columns: 26
              rows: 3
          - type: weather-forecast
            show_current: false
            show_forecast: true
            entity: weather.nws_weather_karb
            forecast_type: daily
            forecast_slots: 7
            name: Weather Forecast
            grid_options:
              columns: 80
              rows: 3
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        column_span: 10
      # --- End HEADER SECTION (Date & Weather) ---  
      # --- START CONTROLS SECTION (Buttons) ---
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: " "
                card_mod:
                  style: |
                    ha-card { background: none; box-shadow: none; border: none; }
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
          - type: vertical-stack
            cards:
              - type: markdown
                content: <font color="Black" size="6">Family Calendar</font>
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
          - type: horizontal-stack
            cards:
              # --- CALENDAR FILTER BUTTONS ---
              - type: custom:bubble-card
                card_type: button
                button_type: name
                name: Family
                icon: mdi:human-male-female-child
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.family_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.family_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--family-default-primary-color)'} !important;
                  }
              - type: custom:bubble-card
                card_type: button
                button_type: name
                name: BenchApp
                icon: mdi:calendar-star
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.benchapp_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.benchapp_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--benchapp-default-primary-color)'} !important;
                  }
            grid_options:
              columns: 45
              rows: auto
          - type: markdown
            content: " "
            grid_options:
              columns: 3
              rows: auto
          - type: custom:bubble-card
            card_type: button
            button_type: name
            card_layout: large
            name: Add Event
            icon: mdi:calendar-plus
            tap_action:
              action: navigate
              navigation_path: "#addcalendarevent"
            styles: |
              * { font-size: 1.05em !important; }
              ha-card { --bubble-main-background-color: #393745 !important; width: 300px; }    
              .bubble-icon { --mdc-icon-size: 30px !important; color: snow !important; opacity: 1; }
              .bubble-icon-container { background: #393745 !important; display: flex; }
              .bubble-name { color: snow !important; opacity: 1; display: flex; line-height: 18px; flex-direction: row; justify-content: center; flex-grow: 1; margin: 0 40px 0 0; pointer-events: none; position: relative; overflow: hidden; }
            grid_options:
              columns: 10
              rows: 1
          - type: custom:bubble-card
            card_type: select
            entity: input_select.calendar_view
            show_name: true
            show_state: true
            name: Select View
            show_last_changed: false
            show_attribute: false
        column_span: 10
      # --- End CONTROLS SECTION (Buttons) ---        
      # --- START CALENDAR SECTION (Week Planner Card) ---
      - type: grid
        cards:
          - type: custom:config-template-card
            entities:
              - input_text.family_calendar_filter
              - input_text.benchapp_calendar_filter
              - input_select.calendar_view
            variables:
              FAMCAL: states['input_text.family_calendar_filter']?.state
              BENCHAPPCAL: states['input_text.benchapp_calendar_filter']?.state
              VIEW: states['input_select.calendar_view']?.state
              STARTDAY: |
                (() => {
                  const calendarView = states['input_select.calendar_view']?.state;
                  if (calendarView === 'Today') return 'today';
                  if (calendarView === 'Tomorrow') return 'tomorrow';
                  return 'monday';
                })()
              DAYS: |
                (() => {
                  const calendarView = states['input_select.calendar_view']?.state;
                  if (calendarView === 'Today') return 1;
                  if (calendarView === 'Tomorrow') return 2;
                  if (calendarView === 'Week') return 7;
                  if (calendarView === 'Biweek') return 14;
                  return "month";
                })()
            card:
              type: custom:week-planner-card
              calendars:
                # --- MAP CALENDARS HERE ---
                - entity: calendar.family
                  name: Family
                  color: "var(--family-default-primary-color)"
                  filter: ${ FAMCAL }
                - entity: calendar.benchapp
                  name: BenchApp
                  color: "var(--benchapp-default-primary-color)"
                  filter: ${ BENCHAPPCAL }
              days: ${ DAYS }
              startingDay: ${ STARTDAY }
              showNavigation: true
              showWeekDayText: false # <--- Requires week-planner-card v1.13.0 or higher
              startingDayOffset: 0
              hideWeekend: false
              noCardBackground: false
              compact: false
              weather:
                showCondition: true
                showTemperature: true
                showLowTemperature: true
                useTwiceDaily: false
                entity: weather.nws_weather_karb
              locale: en
              showLocation: true
              hidePastEvents: false
              hideDaysWithoutEvents: false
              hideTodayWithoutEvents: false
              combineSimilarEvents: true
              showLegend: false
              legendToggle: false
              card_mod:
                style: |
                    /* === BASE SAFETY === */
                    :host {
                      overflow: hidden;
                    }

                    /* === CARD BASE === */
                    ha-card {
                      background: rgba(255, 255, 255, 0.6) !important;
                      border-radius: 24px !important;
                      box-shadow: none !important;
                      height: clamp(480px, 70vh, 900px) !important;
                      max-height: clamp(480px, 70vh, 900px) !important;
                    }

                    /* === GRID LAYOUT === */
                    .container {
                      display: grid !important;
                      grid-template-columns: repeat(7, minmax(0, 1fr)) !important;
                      grid-auto-flow: row dense !important;
                      gap: 0 !important;
                    }

                    .container .navigation,
                    .container .header {
                      grid-column: 1 / -1 !important;
                    }

                    /* WEEKDAY LABEL CELLS */
                    .day.header {
                      display: block !important;
                      grid-column: auto !important;
                      margin: 0 !important;
                      padding: 0.2em !important;
                      text-align: center !important;
                      box-sizing: border-box !important;
                    }

                    .day.header .date .text {
                      font-weight: 600 !important;
                    }

                    /* === DAY TILES === */
                    .day {
                      border: solid 1px whitesmoke !important;
                      padding: 0.2% !important;
                      width: auto !important;
                      min-width: 0 !important;
                      margin: 0 !important;
                      box-sizing: border-box !important;
                      align-self: stretch !important;
                      justify-self: stretch !important;
                    }

                    /* === YOUR ORIGINAL VISUAL RULES === */
                    .event.past {
                      opacity: .2 !important;
                      background-color: gray !important;
                    }

                    .time {
                      color: #333333 !important;
                      font-size: 0.8em !important;
                    }

                    .event {
                      color: #333333 !important;
                      line-height: 16px !important;
                      background-color: var(--border-color) !important;
                      border-radius: 10px !important;
                      max-height: 80px !important;
                      overflow: hidden !important;
                      font-size: 1.1em !important;
                    }

                    .none {
                      background-color: transparent !important;
                    }

                    .today .number {
                      border-radius: 5px !important;
                      background-color: orange !important;
                      padding-left: 4px !important;
                      padding-right: 4px !important;
                    }

                    .day .date .text {
                      font-size: 1em !important;
                      font-weight: bold !important;
                    }

                    .day .date .number {
                      font-weight: bold !important;
                      font-size: 3em !important;
                    }

                    /* Weekday colors */
                    
                    /* When showWeekDayText is true */
                    .day[data-weekday="1"] .date .text,
                    .day[data-weekday="2"] .date .text,
                    .day[data-weekday="3"] .date .text,
                    .day[data-weekday="4"] .date .text,
                    .day[data-weekday="5"] .date .text {
                      color: #2e7d32 !important;
                    }

                    .day[data-weekday="6"] .date .text,
                    .day[data-weekday="7"] .date .text {
                      color: #d32f2f !important;
                    }
                    /* When showWeekDayText is false */
                    .container > .day.header .text {
                      color: #2e7d32 !important;
                    }
                    /* Saturday = column 7 */
                    .container > .day.header:nth-of-type(7) .text {
                      color: #d32f2f !important;
                    }
                    /* Sunday = column 8 */
                    .container > .day.header:nth-of-type(8) .text {
                      color: #d32f2f !important;
                    }


                    /* === RESPONSIVE BREAKPOINTS === */
                    @media (max-width: 1024px) {
                      .day .date .number { font-size: 2em !important; }
                      .day .date .text   { font-size: 0.95em !important; }
                    }

                    @media (max-width: 768px) {
                      .day .date .number { font-size: 1.6em !important; }
                      .day .date .text   { font-size: 0.85em !important; }
                      .event { font-size: 0.85em !important; line-height: 1.1em !important; }
                      .time  { font-size: 0.75em !important; }
                    }

                    /* ========================================================= */
                    /* === MOBILE OVERLAP FIX + TWO‑LINE WRAP FOR TITLES ======== */
                    /* ========================================================= */
                    @media (max-width: 480px) {

                      :host {
                        font-size: clamp(10px, 2.6vw, 13px) !important;
                      }

                      /* Condensed headers */
                      .container .header,
                      .container .navigation {
                        padding: 0.25em 0.4em !important;
                      }

                      /* Day tiles tighter */
                      .day {
                        padding: 0.15em !important;
                        min-width: 0 !important;
                      }

                      /* Smaller date numbers */
                      .day .date .number {
                        font-size: clamp(1.1em, 4.5vw, 1.4em) !important;
                        line-height: 1.1 !important;
                      }
                      .day .date .text {
                        font-size: clamp(0.72em, 3.2vw, 0.85em) !important;
                        line-height: 1.1 !important;
                      }

                      /* Event chip reduced */
                      .event {
                        font-size: clamp(0.72em, 2.9vw, 0.85em) !important;
                        line-height: 1.05em !important;
                        padding: 0.25em 0.35em !important;
                        max-height: 62px !important;
                      }

                      .time {
                        font-size: clamp(0.65em, 2.5vw, 0.78em) !important;
                      }

                      /* === TWO-LINE WRAP FOR TITLES === */
                      .event .title,
                      .event .name,
                      .event .summary,
                      .event .location,
                      .event .desc,
                      .event .description {
                        display: -webkit-box !important;
                        -webkit-box-orient: vertical !important;
                        -webkit-line-clamp: 2 !important;   /* <<< Two lines max */
                        overflow: hidden !important;
                        text-overflow: ellipsis !important;
                        white-space: normal !important;
                        line-height: 1.1em !important;
                        max-height: calc(1.1em * 2) !important;
                      }
                    }

                    /* Slightly larger phones / small tablets */
                    @media (min-width: 481px) and (max-width: 768px) {

                      :host {
                        font-size: clamp(11px, 2.2vw, 14px) !important;
                      }

                      .event {
                        max-height: 72px !important;
                      }

                      .event .title,
                      .event .name,
                      .event .summary {
                        display: -webkit-box !important;
                        -webkit-line-clamp: 2 !important;
                        overflow: hidden !important;
                      }
                    }
            grid_options:
              columns: 120
              rows: 1
              showDescription: false
        column_span: 10
      # --- End CALENDAR SECTION (Week Planner Card) ---
      # --- START POPUP SECTION (Hidden) ---
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#addcalendarevent"
            button_type: name
            name: Add Calendar Event
            icon: mdi:calendar-plus
            show_icon: true
            show_name: true
            styles: |
              .bubble-button-card-container {
                background: ${hass.states['input_select.calendar_select'].state == 'BenchApp' ? 'var(--benchapp-default-primary-color)' : 'var(--family-default-primary-color)'} !important;
              }
            cards:
              - type: entities
                entities:
                  - entity: input_select.calendar_select
                  - entity: input_text.calendar_event_title
                    name: Event Title
                  - entity: input_text.calendar_event_description
                    name: Event Description
                  - entity: input_boolean.calendar_all_day_event
                    name: All Day Event
                title: Add Calendar Event
                state_color: false
              - type: conditional
                conditions:
                  - entity: input_boolean.calendar_all_day_event
                    state: "off"
                card:
                  type: entities
                  entities:
                    - entity: input_datetime.calendar_event_start
                      name: Start Time
                    - entity: input_datetime.calendar_event_end
                      name: End Time
              - type: conditional
                conditions:
                  - entity: input_boolean.calendar_all_day_event
                    state: "on"
                card:
                  type: entities
                  entities:
                    - entity: input_datetime.calendar_day_event_start
                      name: Event Start Date
                    - entity: input_datetime.calendar_day_event_end
                      name: Event End Date
              - type: custom:button-card
                name: Add Event to Calendar
                tap_action:
                  action: call-service
                  service: script.add_google_calendar_event
                styles:
                  card:
                    - background-color: |
                        [[[
                          if (states['input_select.calendar_select'].state == 'BenchApp') return "var(--benchapp-default-primary-color)";
                          return "var(--family-default-primary-color)";
                        ]]]                
    cards: []
    icon: mdi:calendar-blank-multiple
    background:
      opacity: 62
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      # Use File Editor and upload calbackgrd.png to /www/ folder, this translates to /local on this dashboard, so leave /local here.
      image: /local/calbackgrd.png # <--- UPDATE THIS ENTITY
  - type: sections
    max_columns: 10
    title: Lists
    path: lists
    theme: Skylight
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: <font color="Black" size="6">Lists</font>
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
        column_span: 10
      - type: grid
        cards:
          - type: todo-list
            title: Meals
            entity: todo.meals
            hide_completed: true
            hide_section_headers: true
            item_tap_action: edit
            grid_options:
              columns: 60
              rows: auto
            card_mod:
              style: |
                ha-card {
                  background: rgba(255, 255, 255, 0.6) !important;
                  border-radius: 24px !important;
                  box-shadow: none !important;
                }
          - type: todo-list
            title: Meijer
            entity: todo.meijer
            hide_completed: true
            hide_section_headers: true
            item_tap_action: edit
            grid_options:
              columns: 60
              rows: auto
            card_mod:
              style: |
                ha-card {
                  background: rgba(255, 255, 255, 0.6) !important;
                  border-radius: 24px !important;
                  box-shadow: none !important;
                }
        column_span: 10
    cards: []
    icon: mdi:format-list-checks
    background:
      opacity: 62
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image: /local/calbackgrd.png
